<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SiteScope {% block title %}{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --bg2:       #111318;
      --bg3:       #181c24;
      --border:    #232838;
      --accent:    #3dffd0;
      --accent2:   #7b61ff;
      --accent3:   #ff6b6b;
      --text:      #e4e8f0;
      --muted:     #6b7591;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'DM Sans', sans-serif;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* noise overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999;
    }

    /* ── layout ── */
    .shell { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      position: sticky; top: 0; height: 100vh;
    }

    .sidebar-logo {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 15px;
      color: var(--accent);
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.05em;
      display: flex; align-items: center; gap: 8px;
    }
    .sidebar-logo .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .sidebar-section {
      padding: 18px 20px 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .sidebar-link {
      display: block;
      padding: 8px 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      border-left: 2px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-link:hover, .sidebar-link.active {
      color: var(--text);
      border-left-color: var(--accent);
      background: rgba(61,255,208,.05);
    }

    .main { flex: 1; overflow-x: hidden; }

    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h1 {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 600;
    }
    .topbar h1 span { color: var(--muted); font-weight: 400; }

    .content { padding: 32px; }

    /* ── cards ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }
    .card-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── stat cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative; overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
    }
    .stat-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
    }

    /* ── grid layouts ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .three-col { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }

    @media (max-width: 900px) {
      .two-col, .three-col { grid-template-columns: 1fr; }
    }

    /* ── bar chart ── */
    .bar-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .bar-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text);
      width: 160px;
      flex-shrink: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bar-track {
      flex: 1; height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }
    .bar-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      width: 40px;
      text-align: right;
    }

    /* ── sparkline / timeline chart ── */
    .sparkline-wrap { position: relative; height: 120px; }
    .sparkline-wrap svg { width: 100%; height: 100%; }

    /* ── recent events table ── */
    .event-table { width: 100%; border-collapse: collapse; }
    .event-table th {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: left;
      padding: 0 12px 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .event-table td {
      padding: 8px 12px 8px 0;
      font-size: 12px;
      border-bottom: 1px solid rgba(35,40,56,.6);
      vertical-align: middle;
    }
    .event-table tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .badge-pv  { background: rgba(61,255,208,.1);  color: var(--accent);  }
    .badge-end { background: rgba(123,97,255,.1); color: var(--accent2); }
    .badge-ev  { background: rgba(255,107,107,.1); color: var(--accent3); }

    /* ── time filter ── */
    .time-filter { display: flex; gap: 8px; }
    .time-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .time-btn:hover, .time-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(61,255,208,.07);
    }

    /* ── empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 20px;
      display: inline-block;
      margin-top: 12px;
      color: var(--accent);
    }

    /* ── app grid on home ── */
    .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; }
    .app-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: border-color 0.2s, transform 0.2s;
    }
    .app-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .app-card-name {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .app-card-meta { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span class="dot"></span>SiteScope
    </div>
    <div class="sidebar-section">Overview</div>
    <a href="/" class="sidebar-link {% if request.endpoint == 'index' %}active{% endif %}">All Sites</a>
    {% if apps %}
      <div class="sidebar-section">Sites</div>
      {% for a in apps %}
        <a href="/app/{{ a }}" class="sidebar-link {% if app_id is defined and app_id == a %}active{% endif %}">
          {{ a }}
        </a>
      {% endfor %}
    {% endif %}
  </nav>
  <div class="main">
    {% block topbar %}{% endblock %}
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>
</body>
</html>
