<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="{{url_for('static', filename='/images/analysis.svg')}}"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SiteScope {% block title %}{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0c10;
        --bg2: #111318;
        --bg3: #181c24;
        --border: #232838;
        --accent: #3dffd0;
        --accent2: #7b61ff;
        --accent3: #ff6b6b;
        --text: #e4e8f0;
        --muted: #6b7591;
        --font-mono: "IBM Plex Mono", monospace;
        --font-sans: "DM Sans", sans-serif;
        --radius: 10px;
        --sidebar-w: 220px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.6;
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
      }

      /* ── shell layout ── */
      .shell {
        display: flex;
        min-height: 100vh;
      }

      /* ── sidebar ── */
      .sidebar {
        width: var(--sidebar-w);
        flex-shrink: 0;
        background: var(--bg2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 24px 0 0;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        transition: transform 0.25s ease;
        z-index: 200;
      }

      .sidebar-logo {
        font-family: var(--font-mono);
        font-weight: 600;
        font-size: 15px;
        color: var(--accent);
        padding: 0 20px 24px;
        border-bottom: 1px solid var(--border);
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .sidebar-logo .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .sidebar-section {
        padding: 18px 20px 6px;
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        color: var(--muted);
        text-transform: uppercase;
        flex-shrink: 0;
      }

      .sidebar-link {
        display: block;
        padding: 8px 20px;
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        border-left: 2px solid transparent;
        transition: all 0.15s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sidebar-link:hover,
      .sidebar-link.active {
        color: var(--text);
        border-left-color: var(--accent);
        background: rgba(61, 255, 208, 0.05);
      }

      /* ── sidebar app rows with delete button ── */
      .sidebar-app-row {
        display: flex;
        align-items: center;
        padding-right: 8px;
      }
      .sidebar-app-row .sidebar-link {
        flex: 1;
        min-width: 0;
      }
      .btn-delete {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: 1px solid transparent;
        border-radius: 4px;
        color: var(--muted);
        cursor: pointer;
        font-size: 13px;
        line-height: 1;
        opacity: 0;
        transition:
          opacity 0.15s,
          color 0.15s,
          border-color 0.15s;
        padding: 0;
      }
      .sidebar-app-row:hover .btn-delete {
        opacity: 1;
      }
      .btn-delete:hover {
        color: var(--accent3);
        border-color: var(--accent3);
        background: rgba(255, 107, 107, 0.08);
      }

      .sidebar-footer {
        margin-top: auto;
        padding: 16px 20px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .btn-reset {
        width: 100%;
        padding: 7px 0;
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--muted);
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-reset:hover {
        border-color: var(--accent3);
        color: var(--accent3);
        background: rgba(255, 107, 107, 0.06);
      }

      /* ── main area ── */
      .main {
        flex: 1;
        overflow-x: hidden;
        min-width: 0;
      }

      .topbar {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .topbar h1 {
        font-family: var(--font-mono);
        font-size: 16px;
        font-weight: 600;
      }
      .topbar h1 span {
        color: var(--muted);
        font-weight: 400;
      }

      .content {
        padding: 24px 32px;
      }

      /* ── mobile hamburger button ── */
      .hamburger {
        display: none;
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        padding: 6px 10px;
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        flex-shrink: 0;
      }

      /* ── mobile overlay backdrop ── */
      .sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 199;
      }

      /* ── mobile breakpoint ── */
      @media (max-width: 700px) {
        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          height: 100vh;
          transform: translateX(-100%);
        }
        .sidebar.open {
          transform: translateX(0);
          box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5);
        }
        .sidebar-backdrop.open {
          display: block;
        }
        .hamburger {
          display: flex;
          align-items: center;
        }
        .content {
          padding: 16px;
        }
        .topbar {
          padding: 12px 16px;
        }
      }

      /* ── cards ── */
      .card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px 24px;
      }
      .card-title {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      /* ── stat cards ── */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 16px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 20px;
        position: relative;
        overflow: hidden;
      }
      .stat-card::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent2), var(--accent));
      }
      .stat-label {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 28px;
        font-weight: 600;
        color: var(--accent);
        line-height: 1;
      }

      /* ── grid layouts ── */
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      .three-col {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      @media (max-width: 900px) {
        .two-col,
        .three-col {
          grid-template-columns: 1fr;
        }
      }

      /* ── bar chart ── */
      .bar-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .bar-label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text);
        width: 160px;
        flex-shrink: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .bar-track {
        flex: 1;
        height: 6px;
        background: var(--bg3);
        border-radius: 3px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg, var(--accent2), var(--accent));
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .bar-count {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--muted);
        width: 40px;
        text-align: right;
      }

      /* ── sparkline ── */
      .sparkline-wrap {
        position: relative;
        height: 120px;
      }
      .sparkline-wrap svg {
        width: 100%;
        height: 100%;
      }

      /* ── recent events ── */
      .event-table {
        width: 100%;
        border-collapse: collapse;
      }
      .event-table th {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--muted);
        text-transform: uppercase;
        text-align: left;
        padding: 0 12px 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .event-table td {
        padding: 8px 12px 8px 0;
        font-size: 12px;
        border-bottom: 1px solid rgba(35, 40, 56, 0.6);
        vertical-align: middle;
      }
      .event-table tr:last-child td {
        border-bottom: none;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
      }
      .badge-pv {
        background: rgba(61, 255, 208, 0.1);
        color: var(--accent);
      }
      .badge-end {
        background: rgba(123, 97, 255, 0.1);
        color: var(--accent2);
      }
      .badge-ev {
        background: rgba(255, 107, 107, 0.1);
        color: var(--accent3);
      }

      /* ── time filter ── */
      .time-filter {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .time-btn {
        padding: 5px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg3);
        color: var(--muted);
        font-family: var(--font-mono);
        font-size: 11px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.15s;
      }
      .time-btn:hover,
      .time-btn.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(61, 255, 208, 0.07);
      }

      /* ── empty state ── */
      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
      }
      .empty code {
        font-family: var(--font-mono);
        font-size: 12px;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 20px;
        display: inline-block;
        margin-top: 12px;
        color: var(--accent);
      }

      /* ── app grid on home ── */
      .app-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 20px;
      }
      .app-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        text-decoration: none;
        color: var(--text);
        display: block;
        transition:
          border-color 0.2s,
          transform 0.2s;
      }
      .app-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .app-card-name {
        font-family: var(--font-mono);
        font-size: 15px;
        font-weight: 600;
        color: var(--accent);
        margin-bottom: 6px;
      }
      .app-card-meta {
        font-size: 12px;
        color: var(--muted);
      }

      /* ── confirmation modal ── */
      .confirm-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 12, 16, 0.85);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      .confirm-overlay.open {
        display: flex;
      }
      .confirm-box {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px 32px;
        max-width: 340px;
        width: 90%;
        text-align: center;
      }
      .confirm-box h3 {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--accent3);
        margin-bottom: 10px;
      }
      .confirm-box p {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 22px;
      }
      .confirm-btns {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      .confirm-btns button {
        padding: 7px 20px;
        border-radius: 6px;
        font-family: var(--font-mono);
        font-size: 11px;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--bg3);
        color: var(--text);
        transition: all 0.15s;
      }
      .confirm-btns .btn-confirm-yes {
        border-color: var(--accent3);
        color: var(--accent3);
      }
      .confirm-btns .btn-confirm-yes:hover {
        background: rgba(255, 107, 107, 0.12);
      }
      .confirm-btns button:hover {
        border-color: var(--muted);
      }
    </style>
  </head>
  <body>
    <!-- confirmation modal -->
    <div class="confirm-overlay" id="confirm-overlay">
      <div class="confirm-box">
        <h3 id="confirm-title">Are you sure?</h3>
        <p id="confirm-msg"></p>
        <div class="confirm-btns">
          <button onclick="closeConfirm()">Cancel</button>
          <button class="btn-confirm-yes" id="confirm-yes">Delete</button>
        </div>
      </div>
    </div>

    <!-- mobile sidebar backdrop -->
    <div
      class="sidebar-backdrop"
      id="sidebar-backdrop"
      onclick="closeSidebar()"
    ></div>

    <div class="shell">
      <nav class="sidebar" id="sidebar">
        <div class="sidebar-logo"><span class="dot"></span>SiteScope</div>

        <div class="sidebar-section">Overview</div>
        <a
          href="/"
          class="sidebar-link {% if request.endpoint == 'index' %}active{% endif %}"
          onclick="closeSidebar()"
          >All Sites</a
        >

        {% if apps %}
        <div class="sidebar-section">Sites</div>
        <div id="sidebar-apps">{% include "partials/sidebar_apps.html" %}</div>
        {% else %}
        <div id="sidebar-apps"></div>
        {% endif %}

        <div class="sidebar-footer">
          <button
            class="btn-reset"
            onclick="
              openConfirm(
                'Reset entire database?',
                'This permanently deletes all events for every tracked site. The server will not re-seed demo data.',
                function () {
                  doDelete('/db/reset');
                },
              )
            "
          >
            ⚠ Reset all data
          </button>
        </div>
      </nav>

      <div class="main">
        <div class="topbar">
          <button
            class="hamburger"
            id="hamburger"
            onclick="openSidebar()"
            aria-label="Open menu"
          >
            ☰
          </button>
          {% block topbar_inner %}{% endblock %}
        </div>
        <div class="content">{% block content %}{% endblock %}</div>
      </div>
    </div>

    <script>
      /* ── mobile sidebar ── */
      function openSidebar() {
        document.getElementById("sidebar").classList.add("open");
        document.getElementById("sidebar-backdrop").classList.add("open");
      }
      function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sidebar-backdrop").classList.remove("open");
      }

      /* ── confirmation modal ── */
      var _confirmCb = null;
      function openConfirm(title, msg, cb) {
        document.getElementById("confirm-title").textContent = title;
        document.getElementById("confirm-msg").textContent = msg;
        _confirmCb = cb;
        document.getElementById("confirm-overlay").classList.add("open");
      }
      function closeConfirm() {
        document.getElementById("confirm-overlay").classList.remove("open");
        _confirmCb = null;
      }
      document
        .getElementById("confirm-yes")
        .addEventListener("click", function () {
          var cb = _confirmCb; // grab before closeConfirm nulls it
          closeConfirm();
          if (cb) cb();
        });
      document
        .getElementById("confirm-overlay")
        .addEventListener("click", function (e) {
          if (e.target === this) closeConfirm();
        });

      /* ── shared delete/reset helper ── */
      function doDelete(url) {
        fetch(url, { method: "POST" })
          .then(function (res) {
            var redirect = res.headers.get("HX-Redirect");
            window.location.href = redirect || "/";
          })
          .catch(function () {
            window.location.href = "/";
          });
      }
    </script>
  </body>
</html>
