<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-label">Pageviews</div>
    <div class="stat-value">{{ overview.pageviews }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Unique Visitors</div>
    <div class="stat-value">{{ overview.visitors }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Sessions</div>
    <div class="stat-value">{{ overview.sessions }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Avg Duration</div>
    <div class="stat-value">{{ overview.avg_duration_s }}<span style="font-size:14px;color:var(--muted)">s</span></div>
  </div>
</div>
